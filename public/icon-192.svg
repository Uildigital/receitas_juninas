<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#5C2A0A"/>
      <stop offset="100%" stop-color="#2A0F02"/>
    </radialGradient>
    <linearGradient id="corn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD45E"/>
      <stop offset="100%" stop-color="#E8960A"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8E30"/>
      <stop offset="100%" stop-color="#B75317"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Subtle glow -->
  <ellipse cx="96" cy="70" rx="70" ry="55" fill="#B75317" opacity="0.15"/>

  <!-- Corn body (stylized, vertical) -->
  <rect x="77" y="38" width="38" height="80" rx="19" fill="url(#corn)"/>

  <!-- Corn kernels (3x5 grid) -->
  <circle cx="87" cy="55" r="5" fill="#C47800" opacity="0.5"/>
  <circle cx="96" cy="55" r="5" fill="#C47800" opacity="0.5"/>
  <circle cx="105" cy="55" r="5" fill="#C47800" opacity="0.5"/>
  <circle cx="87" cy="67" r="5" fill="#C47800" opacity="0.5"/>
  <circle cx="96" cy="67" r="5" fill="#C47800" opacity="0.5"/>
  <circle cx="105" cy="67" r="5" fill="#C47800" opacity="0.5"/>
  <circle cx="87" cy="79" r="5" fill="#C47800" opacity="0.5"/>
  <circle cx="96" cy="79" r="5" fill="#C47800" opacity="0.5"/>
  <circle cx="105" cy="79" r="5" fill="#C47800" opacity="0.5"/>
  <circle cx="87" cy="91" r="5" fill="#C47800" opacity="0.4"/>
  <circle cx="96" cy="91" r="5" fill="#C47800" opacity="0.4"/>
  <circle cx="105" cy="91" r="5" fill="#C47800" opacity="0.4"/>

  <!-- Corn leaves -->
  <ellipse cx="63" cy="72" rx="22" ry="8" fill="#4CAF50" opacity="0.8" transform="rotate(-30 63 72)"/>
  <ellipse cx="129" cy="68" rx="22" ry="8" fill="#4CAF50" opacity="0.8" transform="rotate(30 129 68)"/>

  <!-- Corn silk (top) -->
  <line x1="92" y1="38" x2="88" y2="22" stroke="#FFD45E" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="96" y1="38" x2="96" y2="20" stroke="#FFD45E" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <line x1="100" y1="38" x2="104" y2="22" stroke="#FFD45E" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- Calculator display area (bottom) -->
  <rect x="36" y="132" width="120" height="44" rx="14" fill="url(#orange)"/>
  <rect x="42" y="138" width="108" height="32" rx="10" fill="#1A0800" opacity="0.4"/>

  <!-- R$ symbol -->
  <text x="55" y="160" font-family="Arial Black, sans-serif" font-weight="900" font-size="18" fill="#FFD45E" letter-spacing="-1">R$</text>

  <!-- lucro text -->
  <text x="90" y="160" font-family="Arial Black, sans-serif" font-weight="900" font-size="13" fill="white" opacity="0.9">LUCRO</text>
</svg>
